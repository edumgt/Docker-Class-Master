services:
  odoo-rdbms:
    image: postgres:16-alpine
    container_name: odoo-rdbms
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: "123456"
    ports:
      - "9050:5432"
    volumes:
      - odoo_pg_data:/var/lib/postgresql/data
      - ./docker/db-init/postgres-odoo.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d odoo"]
      interval: 10s
      timeout: 5s
      retries: 10

  odoo-auth:
    build:
      context: ./docker/member-auth
    container_name: odoo-auth
    environment:
      SOLUTION: odoo
      PORT: "9000"
      DEFAULT_PASSWORD: "123456"
      JWT_SECRET: "123456"
      DB_TYPE: postgres
      DB_HOST: odoo-rdbms
      DB_PORT: "5432"
      DB_NAME: odoo
      DB_USER: odoo
      DB_PASSWORD: "123456"
    ports:
      - "9000:9000"
    depends_on:
      odoo-rdbms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  erpnext-rdbms:
    image: mariadb:11
    container_name: erpnext-rdbms
    environment:
      MARIADB_DATABASE: erpnext
      MARIADB_USER: erpnext
      MARIADB_PASSWORD: "123456"
      MARIADB_ROOT_PASSWORD: "123456"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "9051:3306"
    volumes:
      - erpnext_mariadb_data:/var/lib/mysql
      - ./docker/db-init/mariadb-erpnext.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u root -p123456 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  erpnext-auth:
    build:
      context: ./docker/member-auth
    container_name: erpnext-auth
    environment:
      SOLUTION: erpnext
      PORT: "9000"
      DEFAULT_PASSWORD: "123456"
      JWT_SECRET: "123456"
      DB_TYPE: mariadb
      DB_HOST: erpnext-rdbms
      DB_PORT: "3306"
      DB_NAME: erpnext
      DB_USER: erpnext
      DB_PASSWORD: "123456"
    ports:
      - "9001:9000"
    depends_on:
      erpnext-rdbms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=2).read()"]
      interval: 10s
