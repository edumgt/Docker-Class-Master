<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance RAG Lab — Web UI</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 마크다운 목록 스타일 */
    #answer-text ul { list-style: disc; padding-left: 1.5rem; }
    #answer-text li { margin-bottom: 0.25rem; }
    /* 타이핑 커서 애니메이션 */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor::after { content:'▍'; animation: blink 1s step-start infinite; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 flex flex-col">

  <!-- ── 헤더 ───────────────────────────────────────────────────────────── -->
  <header class="border-b border-slate-700 px-6 py-4 flex items-center gap-3 shadow-lg">
    <span class="text-2xl">📊</span>
    <div>
      <h1 class="text-xl font-bold tracking-tight">Finance RAG Lab</h1>
      <p class="text-xs text-slate-400">금융공학 문서 기반 TF-IDF RAG 질의응답 시스템</p>
    </div>
    <a href="/docs" target="_blank"
       class="ml-auto text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-full transition">
      API Docs ↗
    </a>
  </header>

  <!-- ── 메인 ───────────────────────────────────────────────────────────── -->
  <main class="flex-1 flex flex-col items-center justify-start px-4 py-10 gap-6 max-w-3xl mx-auto w-full">

    <!-- 예시 질의 칩 -->
    <section class="w-full">
      <p class="text-xs text-slate-400 mb-2 font-medium uppercase tracking-wider">예시 질문</p>
      <div class="flex flex-wrap gap-2" id="chips">
        <button class="chip text-xs bg-slate-700 hover:bg-indigo-600 px-3 py-1.5 rounded-full transition">듀레이션과 금리 민감도 관계를 설명해줘</button>
        <button class="chip text-xs bg-slate-700 hover:bg-indigo-600 px-3 py-1.5 rounded-full transition">VaR와 Expected Shortfall의 차이는?</button>
        <button class="chip text-xs bg-slate-700 hover:bg-indigo-600 px-3 py-1.5 rounded-full transition">시장 충격 시 유동성 리스크를 줄이는 주문 전략은?</button>
        <button class="chip text-xs bg-slate-700 hover:bg-indigo-600 px-3 py-1.5 rounded-full transition">파생상품 데스크의 모델 리스크 운영 통제는?</button>
      </div>
    </section>

    <!-- 입력 영역 -->
    <section class="w-full bg-slate-800 rounded-2xl shadow-xl p-5 flex flex-col gap-4 border border-slate-700">
      <label for="question" class="text-sm font-semibold text-slate-300">질문 입력</label>
      <textarea
        id="question"
        rows="3"
        placeholder="금융공학 관련 질문을 입력하세요…"
        class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-500"
      ></textarea>

      <div class="flex items-center gap-4">
        <!-- top_k 슬라이더 -->
        <div class="flex items-center gap-2 flex-1">
          <label for="top-k" class="text-xs text-slate-400 whitespace-nowrap">근거 문서 수</label>
          <input id="top-k" type="range" min="1" max="10" value="3"
                 class="flex-1 accent-indigo-500" />
          <span id="top-k-val" class="text-xs font-bold text-indigo-400 w-4 text-right">3</span>
        </div>
        <!-- 전송 버튼 -->
        <button id="ask-btn"
                class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed px-6 py-2.5 rounded-xl text-sm font-semibold transition flex items-center gap-2">
          <span id="btn-icon">🔍</span>
          <span id="btn-label">질문하기</span>
        </button>
      </div>
    </section>

    <!-- 결과 영역 (초기엔 숨김) -->
    <section id="result" class="w-full hidden flex-col gap-4">

      <!-- 답변 카드 -->
      <div class="bg-slate-800 rounded-2xl border border-slate-700 p-5 shadow-lg">
        <h2 class="text-sm font-semibold text-indigo-400 mb-3 flex items-center gap-2">
          <span>💡</span> 답변
        </h2>
        <div id="answer-text" class="text-sm leading-relaxed text-slate-200 whitespace-pre-wrap"></div>
      </div>

      <!-- 근거 문서 카드 -->
      <div id="citations-card" class="bg-slate-800 rounded-2xl border border-slate-700 p-5 shadow-lg hidden">
        <h2 class="text-sm font-semibold text-emerald-400 mb-3 flex items-center gap-2">
          <span>📎</span> 근거 문서
        </h2>
        <ul id="citations-list" class="flex flex-col gap-2"></ul>
      </div>

    </section>

    <!-- 에러 배너 (초기엔 숨김) -->
    <div id="error-banner"
         class="hidden w-full bg-red-900/50 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-xl">
      <span id="error-msg"></span>
    </div>

  </main>

  <!-- ── 푸터 ───────────────────────────────────────────────────────────── -->
  <footer class="text-center text-xs text-slate-600 py-4">
    Finance RAG Lab · FastAPI + Vanilla JS + Tailwind CSS
  </footer>

  <script>
    // ── DOM 참조 ────────────────────────────────────────────────────────────
    const questionEl   = document.getElementById('question');
    const askBtn       = document.getElementById('ask-btn');
    const btnIcon      = document.getElementById('btn-icon');
    const btnLabel     = document.getElementById('btn-label');
    const topKEl       = document.getElementById('top-k');
    const topKValEl    = document.getElementById('top-k-val');
    const resultEl     = document.getElementById('result');
    const answerEl     = document.getElementById('answer-text');
    const citationsCard = document.getElementById('citations-card');
    const citationsList = document.getElementById('citations-list');
    const errorBanner  = document.getElementById('error-banner');
    const errorMsg     = document.getElementById('error-msg');

    // ── top-k 슬라이더 ─────────────────────────────────────────────────────
    topKEl.addEventListener('input', () => {
      topKValEl.textContent = topKEl.value;
    });

    // ── 예시 질문 칩 ──────────────────────────────────────────────────────
    document.getElementById('chips').addEventListener('click', (e) => {
      const chip = e.target.closest('.chip');
      if (chip) {
        questionEl.value = chip.textContent.trim();
        questionEl.focus();
      }
    });

    // ── Enter 단축키 (Shift+Enter 는 줄바꿈) ──────────────────────────────
    questionEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askBtn.click();
      }
    });

    // ── 상태 헬퍼 ──────────────────────────────────────────────────────────
    function setLoading(loading) {
      askBtn.disabled = loading;
      btnIcon.textContent  = loading ? '⏳' : '🔍';
      btnLabel.textContent = loading ? '검색 중…' : '질문하기';
    }

    function showError(msg) {
      errorBanner.classList.remove('hidden');
      errorMsg.textContent = msg;
    }

    function hideError() {
      errorBanner.classList.add('hidden');
      errorMsg.textContent = '';
    }

    // ── 마크다운 목록 렌더링 (간단 변환) ──────────────────────────────────
    function renderAnswer(text) {
      // "- 텍스트" 패턴을 <ul><li>로 변환
      const lines = text.split('\n');
      let html = '';
      let inList = false;
      for (const line of lines) {
        if (line.startsWith('- ')) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${escapeHtml(line.slice(2))}</li>`;
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += escapeHtml(line) + '<br/>';
        }
      }
      if (inList) html += '</ul>';
      answerEl.innerHTML = html;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── 질문 전송 ──────────────────────────────────────────────────────────
    askBtn.addEventListener('click', async () => {
      const question = questionEl.value.trim();
      if (!question) {
        questionEl.focus();
        return;
      }

      hideError();
      setLoading(true);
      resultEl.classList.add('hidden');
      citationsCard.classList.add('hidden');
      citationsList.innerHTML = '';
      answerEl.textContent = '';

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, top_k: Number(topKEl.value) }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `서버 오류 (${res.status})`);
        }

        const data = await res.json();

        // 답변 표시
        renderAnswer(data.answer);
        resultEl.classList.remove('hidden');

        // 근거 문서 표시
        if (data.citations && data.citations.length > 0) {
          citationsList.innerHTML = '';
          data.citations.forEach((c, i) => {
            const li = document.createElement('li');
            li.className = 'flex items-start gap-2 text-xs text-slate-300 bg-slate-900 rounded-lg px-3 py-2';
            li.innerHTML = `<span class="text-emerald-500 font-bold shrink-0">#${i + 1}</span><span>${escapeHtml(c)}</span>`;
            citationsList.appendChild(li);
          });
          citationsCard.classList.remove('hidden');
        }

      } catch (err) {
        showError(err.message || '알 수 없는 오류가 발생했습니다.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
