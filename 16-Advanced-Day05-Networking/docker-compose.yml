services:
  db:
    image: postgres:16-alpine
    container_name: ${DB_CONTAINER_NAME:-db}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app1234}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [appnet]

  api:
    build:
      context: ./api
    container_name: ${API_CONTAINER_NAME:-api}
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: ${DB_NAME:-app}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app1234}
      APP_ENV: ${APP_ENV:-local}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    networks: [appnet]

volumes:
  postgres_data:

networks:
  appnet:
    driver: bridge
