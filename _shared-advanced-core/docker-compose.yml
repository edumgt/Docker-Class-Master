services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
    - db_data:/var/lib/postgresql/data
    networks:
    - shared-net
  api:
    image: your-api-image:latest
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
    depends_on:
    - db
    ports:
    - 8080:8080
    networks:
    - shared-net
  web:
    image: nginx:alpine
    ports:
    - 80:80
    depends_on:
    - api
    networks:
    - shared-net
volumes:
  db_data: null
networks:
  shared-net:
    external: true
